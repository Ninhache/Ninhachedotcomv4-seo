<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" role="img" aria-label="deob-mapper: ProGuard-decompiled Java appears as a blurred, unreadable mess of mangled names; a descending focus line sharpens and deobfuscates the code in its wake — like a mask lifting — resolving fBU.java into readable PlayerEntity.java, matched on the string literals and structure that survive obfuscation.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="32%" r="92%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </radialGradient>
    <filter id="gG" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="blur" x="-10%" y="-10%" width="120%" height="120%"><feGaussianBlur stdDeviation="2.4"/></filter>
    <!-- sharp/readable region: from top down to the focus line (grows) -->
    <clipPath id="clipSharp"><rect x="40" y="126" width="616" height="0">
      <animate attributeName="height" values="0;0;0;376;376" keyTimes="0;0.2;0.55;0.9;1" dur="10s" repeatCount="indefinite"/>
    </rect></clipPath>
    <!-- blurred/mangled region: from the focus line down to the bottom (shrinks) -->
    <clipPath id="clipBlur"><rect x="40" y="126" width="616" height="376">
      <animate attributeName="y" values="126;126;126;502;502" keyTimes="0;0.2;0.55;0.9;1" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="height" values="376;376;376;0;0" keyTimes="0;0.2;0.55;0.9;1" dur="10s" repeatCount="indefinite"/>
    </rect></clipPath>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- title -->
  <text x="40" y="46" fill="#e6edf3" font-size="23" font-weight="700">deob<tspan fill="#3fb950">-mapper</tspan></text>
  <!-- phase word (top-right) -->
  <g text-anchor="end" font-size="12.5" font-weight="700">
    <text x="920" y="52" fill="#e3a008"><animate attributeName="opacity" values="1;0;0;0" keyTimes="0;0.2;0.4;0.55" dur="10s" calcMode="discrete" repeatCount="indefinite"/>● decompiled</text>
    <text x="920" y="52" fill="#58a6ff"><animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.2;0.4;0.55" dur="10s" calcMode="discrete" repeatCount="indefinite"/>● fingerprint</text>
    <text x="920" y="52" fill="#d29922"><animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.2;0.4;0.55" dur="10s" calcMode="discrete" repeatCount="indefinite"/>● match</text>
    <text x="920" y="52" fill="#3fb950"><animate attributeName="opacity" values="0;0;0;1" keyTimes="0;0.2;0.4;0.55" dur="10s" calcMode="discrete" repeatCount="indefinite"/>● recover</text>
  </g>

  <!-- ================= CODE EDITOR (left) ================= -->
  <rect x="40" y="92" width="616" height="410" rx="10" fill="#0d1117" stroke="#30363d"/>
  <rect x="40" y="92" width="616" height="34" rx="10" fill="#161b22"/>
  <rect x="40" y="116" width="616" height="10" fill="#161b22"/>
  <circle cx="62" cy="109" r="4" fill="#f85149"/><circle cx="78" cy="109" r="4" fill="#d29922"/><circle cx="94" cy="109" r="4" fill="#3fb950"/>
  <text x="118" y="114" font-size="13" fill="#e3a008"><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.85;1" dur="10s" calcMode="discrete" repeatCount="indefinite"/>fBU.java</text>
  <text x="118" y="114" font-size="13" font-weight="700" fill="#3fb950" filter="url(#gG)" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.85;1" dur="10s" calcMode="discrete" repeatCount="indefinite"/>PlayerEntity.java</text>

  <!-- gutter -->
  <line x1="80" y1="126" x2="80" y2="502" stroke="#21262d"/>
  <g fill="#3d4452" font-size="12" text-anchor="end">
    <text x="72" y="170">1</text><text x="72" y="203">2</text><text x="72" y="236">3</text><text x="72" y="269">4</text>
    <text x="72" y="302">5</text><text x="72" y="335">6</text><text x="72" y="368">7</text><text x="72" y="401">8</text>
    <text x="72" y="434">9</text><text x="72" y="467">10</text>
  </g>

  <!-- BLURRED MANGLED LAYER (clipped to below the focus line) -->
  <g clip-path="url(#clipBlur)" filter="url(#blur)" font-size="15" xml:space="preserve">
    <text x="92" y="170"><tspan fill="#ff7b72">class </tspan><tspan fill="#e3a008">fBU</tspan><tspan fill="#ff7b72"> extends </tspan><tspan fill="#e3a008">qZ</tspan><tspan fill="#8b949e"> {</tspan></text>
    <text x="92" y="203"><tspan fill="#ff7b72">  private </tspan><tspan fill="#79c0ff">int </tspan><tspan fill="#e3a008">aB</tspan><tspan fill="#8b949e"> = </tspan><tspan fill="#79c0ff">20</tspan><tspan fill="#8b949e">;</tspan></text>
    <text x="92" y="236"><tspan fill="#ff7b72">  private </tspan><tspan fill="#79c0ff">String </tspan><tspan fill="#e3a008">aC</tspan><tspan fill="#8b949e"> = </tspan><tspan fill="#3fb950">"spawn"</tspan><tspan fill="#8b949e">;</tspan></text>
    <text x="92" y="302"><tspan fill="#ff7b72">  void </tspan><tspan fill="#e3a008">aD</tspan><tspan fill="#8b949e">(</tspan><tspan fill="#79c0ff">int </tspan><tspan fill="#e3a008">a</tspan><tspan fill="#8b949e">) {</tspan></text>
    <text x="92" y="335"><tspan fill="#ff7b72">    this</tspan><tspan fill="#8b949e">.</tspan><tspan fill="#e3a008">aB</tspan><tspan fill="#8b949e"> -= </tspan><tspan fill="#e3a008">a</tspan><tspan fill="#8b949e">;</tspan></text>
    <text x="92" y="368"><tspan fill="#ff7b72">    if </tspan><tspan fill="#8b949e">(</tspan><tspan fill="#e3a008">aB</tspan><tspan fill="#8b949e"> &lt;= </tspan><tspan fill="#79c0ff">0</tspan><tspan fill="#8b949e">) </tspan><tspan fill="#e3a008">aE</tspan><tspan fill="#8b949e">();</tspan></text>
    <text x="92" y="401" fill="#8b949e">  }</text>
    <text x="92" y="467"><tspan fill="#ff7b72">  void </tspan><tspan fill="#e3a008">aE</tspan><tspan fill="#8b949e">() { </tspan><tspan fill="#e3a008">dN9</tspan><tspan fill="#8b949e">.</tspan><tspan fill="#e3a008">b</tspan><tspan fill="#8b949e">(</tspan><tspan fill="#3fb950">"dead"</tspan><tspan fill="#8b949e">); }</tspan></text>
  </g>

  <!-- SHARP READABLE LAYER (clipped to above the focus line) -->
  <g clip-path="url(#clipSharp)" font-size="15" xml:space="preserve">
    <text x="92" y="170"><tspan fill="#ff7b72">class </tspan><tspan fill="#c9c2d1">PlayerEntity</tspan><tspan fill="#ff7b72"> extends </tspan><tspan fill="#79c0ff">Entity</tspan><tspan fill="#8b949e"> {</tspan></text>
    <text x="92" y="203"><tspan fill="#ff7b72">  private </tspan><tspan fill="#79c0ff">int </tspan><tspan fill="#c9c2d1">health</tspan><tspan fill="#8b949e"> = </tspan><tspan fill="#79c0ff">20</tspan><tspan fill="#8b949e">;</tspan></text>
    <text x="92" y="236"><tspan fill="#ff7b72">  private </tspan><tspan fill="#79c0ff">String </tspan><tspan fill="#c9c2d1">tag</tspan><tspan fill="#8b949e"> = </tspan><tspan fill="#3fb950">"spawn"</tspan><tspan fill="#8b949e">;</tspan></text>
    <text x="92" y="302"><tspan fill="#ff7b72">  void </tspan><tspan fill="#c9c2d1">damage</tspan><tspan fill="#8b949e">(</tspan><tspan fill="#79c0ff">int </tspan><tspan fill="#c9c2d1">amount</tspan><tspan fill="#8b949e">) {</tspan></text>
    <text x="92" y="335"><tspan fill="#ff7b72">    this</tspan><tspan fill="#8b949e">.</tspan><tspan fill="#c9c2d1">health</tspan><tspan fill="#8b949e"> -= </tspan><tspan fill="#c9c2d1">amount</tspan><tspan fill="#8b949e">;</tspan></text>
    <text x="92" y="368"><tspan fill="#ff7b72">    if </tspan><tspan fill="#8b949e">(</tspan><tspan fill="#c9c2d1">health</tspan><tspan fill="#8b949e"> &lt;= </tspan><tspan fill="#79c0ff">0</tspan><tspan fill="#8b949e">) </tspan><tspan fill="#c9c2d1">die</tspan><tspan fill="#8b949e">();</tspan></text>
    <text x="92" y="401" fill="#8b949e">  }</text>
    <text x="92" y="467"><tspan fill="#ff7b72">  void </tspan><tspan fill="#c9c2d1">die</tspan><tspan fill="#8b949e">() { </tspan><tspan fill="#79c0ff">World</tspan><tspan fill="#8b949e">.</tspan><tspan fill="#c9c2d1">log</tspan><tspan fill="#8b949e">(</tspan><tspan fill="#3fb950">"dead"</tspan><tspan fill="#8b949e">); }</tspan></text>
  </g>

  <!-- descending focus line (the mask edge) -->
  <rect x="44" width="608" height="2.5" fill="#3fb950" filter="url(#gG)">
    <animate attributeName="y" values="126;126;126;502;502" keyTimes="0;0.2;0.55;0.9;1" dur="10s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.54;0.55;0.9;1" dur="10s" repeatCount="indefinite"/>
  </rect>

  <!-- ================= MATCH RAIL (right) ================= -->
  <rect x="680" y="92" width="240" height="410" rx="10" fill="#0d1117" stroke="#30363d"/>
  <text x="700" y="120" fill="#6e6478" font-size="10.5" letter-spacing="1.2">CANDIDATES</text>

