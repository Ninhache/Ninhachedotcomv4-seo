  <rect x="700" y="158" height="6" rx="3" fill="#3fb950"><animate attributeName="width" values="0;0;172;172;0" keyTimes="0;0.2;0.4;0.97;1" dur="10s" repeatCount="indefinite"/></rect>

  <text x="700" y="194" font-size="13" fill="#c9c2d1">aCK.java</text>
  <text x="900" y="194" font-size="12.5" font-weight="700" fill="#d29922" text-anchor="end" opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.38;0.4;1" dur="10s" calcMode="discrete" repeatCount="indefinite"/>0.58</text>
  <rect x="700" y="202" width="200" height="6" rx="3" fill="#21262d"/>
  <rect x="700" y="202" height="6" rx="3" fill="#d29922"><animate attributeName="width" values="0;0;116;116;0" keyTimes="0;0.22;0.4;0.97;1" dur="10s" repeatCount="indefinite"/></rect>

  <text x="700" y="238" font-size="13" fill="#8b949e">qZ3.java</text>
  <text x="900" y="238" font-size="12.5" font-weight="700" fill="#f85149" text-anchor="end" opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.38;0.4;1" dur="10s" calcMode="discrete" repeatCount="indefinite"/>0.22</text>
  <rect x="700" y="246" width="200" height="6" rx="3" fill="#21262d"/>
  <rect x="700" y="246" height="6" rx="3" fill="#f85149"><animate attributeName="width" values="0;0;44;44;0" keyTimes="0;0.24;0.4;0.97;1" dur="10s" repeatCount="indefinite"/></rect>

  <line x1="700" y1="276" x2="900" y2="276" stroke="#21262d"/>

  <text x="700" y="300" fill="#6e6478" font-size="10.5" letter-spacing="1.2">MATCHED ON</text>
  <g font-size="11">
    <text x="700" y="324" fill="#3fb950">strings</text><text x="900" y="324" fill="#6e6478" font-size="10" text-anchor="end">.35</text>
