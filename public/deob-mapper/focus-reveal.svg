    <rect x="772" y="340" height="6" rx="3" fill="#58a6ff"><animate attributeName="width" values="0;0;60;60;0" keyTimes="0;0.22;0.38;0.97;1" dur="10s" repeatCount="indefinite"/></rect>
    <text x="700" y="372" fill="#8b9099">structure</text><text x="900" y="372" fill="#6e6478" font-size="10" text-anchor="end">.10</text>
