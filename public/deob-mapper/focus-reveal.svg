  <text x="900" y="150" font-size="12.5" font-weight="700" fill="#3fb950" text-anchor="end" opacity="0"><animate attributeName="opacity" values="0;0;1;1" keyTimes="0;0.38;0.4;1" dur="10s" calcMode="discrete" repeatCount="indefinite"/>0.86</text>
