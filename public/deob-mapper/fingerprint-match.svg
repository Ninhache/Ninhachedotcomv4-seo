    <text x="92" y="203" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.67;1" dur="10s" calcMode="discrete" repeatCount="indefinite"/><tspan fill="#ff7b72">  private </tspan><tspan fill="#79c0ff">int </tspan><tspan fill="#c9c2d1">health</tspan><tspan fill="#8b949e"> = </tspan><tspan fill="#79c0ff">20</tspan><tspan fill="#8b949e">;</tspan></text>
