  <text x="118" y="114" font-size="13" font-weight="700" fill="#3fb950" filter="url(#gG)" opacity="0"><animate attributeName="opacity" values="0;0;1" keyTimes="0;0.86;1" dur="10s" calcMode="discrete" repeatCount="indefinite"/>PlayerEntity.java</text>

