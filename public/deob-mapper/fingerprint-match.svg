    <text x="920" y="52" fill="#d29922"><animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.2;0.4;0.6" dur="10s" calcMode="discrete" repeatCount="indefinite"/>● match</text>
    <text x="920" y="52" fill="#3fb950"><animate attributeName="opacity" values="0;0;0;1" keyTimes="0;0.2;0.4;0.6" dur="10s" calcMode="discrete" repeatCount="indefinite"/>● recover</text>
  </g>

