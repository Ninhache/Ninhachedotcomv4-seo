<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" role="img" aria-label="deob-mapper: ProGuard-decompiled Java with mangled identifiers (class fBU, method aD) is matched against readable sources by the features that survive obfuscation — string literals, structure, imports — then its names are recovered in place, resolving fBU.java back into PlayerEntity.java with 0.86 confidence.">
