<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" role="img" aria-label="typescript-horrors RPN calculator: when the stack overflows it 'crashes UP' a ladder of strategies (recursion, then bitwise), the child process dies and the supervisor climbs, while the CPU thermometer heats up — run in winter only.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="36%" r="85%">
      <stop offset="0%" stop-color="#1a1320"/>
      <stop offset="100%" stop-color="#0d0a12"/>
    </radialGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f85149"/>
      <stop offset="100%" stop-color="#7d1f1f"/>
    </linearGradient>
    <filter id="gR" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3.4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="gB" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="7" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- title -->
  <text x="40" y="46" fill="#e6edf3" font-size="23" font-weight="700">typescript<tspan fill="#f85149">-horrors</tspan></text>
  <text x="42" y="68" fill="#8b7d92" font-size="12.5">ultra RPN calculator — <tspan fill="#d29922">it crashes UP ↑</tspan></text>

  <!-- ================= ESCALATION LADDER (left) ================= -->
  <line x1="44"  y1="116" x2="44"  y2="436" stroke="#30363d" stroke-width="2"/>
  <line x1="298" y1="116" x2="298" y2="436" stroke="#30363d" stroke-width="2"/>

  <!-- static rung panels + labels (bottom = rung 1, climbs UP) -->
  <g font-size="12">
    <rect x="44" y="388" width="254" height="48" rx="8" fill="#161b22" stroke="#30363d"/>
    <rect x="44" y="320" width="254" height="48" rx="8" fill="#161b22" stroke="#30363d"/>
    <rect x="44" y="252" width="254" height="48" rx="8" fill="#161b22" stroke="#30363d"/>
    <rect x="44" y="184" width="254" height="48" rx="8" fill="#161b22" stroke="#30363d"/>
    <rect x="44" y="116" width="254" height="48" rx="8" fill="#161b22" stroke="#30363d"/>

    <g fill="#6e6478" text-anchor="middle">
      <circle cx="72" cy="412" r="13" fill="#0d0a12" stroke="#3d3447"/><text x="72" y="416" fill="#8b7d92">1</text>
      <circle cx="72" cy="344" r="13" fill="#0d0a12" stroke="#3d3447"/><text x="72" y="348" fill="#8b7d92">2</text>
      <circle cx="72" cy="276" r="13" fill="#0d0a12" stroke="#3d3447"/><text x="72" y="280" fill="#8b7d92">3</text>
      <circle cx="72" cy="208" r="13" fill="#0d0a12" stroke="#3d3447"/><text x="72" y="212" fill="#8b7d92">4</text>
      <circle cx="72" cy="140" r="13" fill="#0d0a12" stroke="#3d3447"/><text x="72" y="144" fill="#8b7d92">5</text>
    </g>
    <g fill="#c9c2d1">
      <text x="96" y="409">recursion</text><text x="96" y="424" fill="#6e6478" font-size="10.5">default</text>
      <text x="96" y="341">recursion</text><text x="96" y="356" fill="#6e6478" font-size="10.5">80% stack</text>
      <text x="96" y="273">bitwise</text><text x="96" y="288" fill="#6e6478" font-size="10.5">default</text>
      <text x="96" y="205">bitwise</text><text x="96" y="220" fill="#6e6478" font-size="10.5">80% stack</text>
      <text x="96" y="137">gives up</text><text x="96" y="152" fill="#6e6478" font-size="10.5">politely 🔥</text>
    </g>
  </g>

  <!-- moving "active rung" highlight -->
  <rect x="44" width="254" height="48" rx="8" fill="#3178c61f" stroke="#3178c6" stroke-width="1.6" filter="url(#gB)">
    <animate attributeName="y" values="388;320;252;184;116" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/>
  </rect>
  <!-- climber chevron -->
  <g fill="#3178c6" filter="url(#gB)">
    <polygon points="20,404 36,412 20,420">
      <animateTransform attributeName="transform" type="translate" values="0,0;0,-68;0,-136;0,-204;0,-272" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/>
    </polygon>
  </g>
  <!-- outcome marks on passed rungs (skull for crashed recursion, check for bitwise) -->
  <g font-size="15" text-anchor="middle">
    <text x="276" y="417">💀<animate attributeName="opacity" values="0;1;1;1;1" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="276" y="349">💀<animate attributeName="opacity" values="0;0;1;1;1" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="276" y="281" fill="#3fb950">✓<animate attributeName="opacity" values="0;0;0;1;1" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="276" y="213" fill="#3fb950">✓<animate attributeName="opacity" values="0;0;0;0;1" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/></text>
  </g>

  <!-- ================= CURRENT ATTEMPT (center console) ================= -->
  <text x="490" y="130" fill="#6e6478" font-size="11" text-anchor="middle" letter-spacing="2">CHILD PROCESS</text>
  <rect x="330" y="140" width="320" height="252" rx="10" fill="#0d0a12" stroke="#30363d"/>

  <!-- recursion attempt (phases 0 & 1) -->
  <g opacity="0">
    <animate attributeName="opacity" values="1;1;0;0;0" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/>
    <text x="352" y="170" fill="#c9c2d1" font-size="13">recursion()</text>
    <!-- growing stack tower that overflows every 2s -->
    <rect x="360" width="58" fill="url(#tower)">
      <animate attributeName="height" values="10;188;188;10" keyTimes="0;0.72;0.84;1" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="y" values="360;182;182;360" keyTimes="0;0.72;0.84;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <g stroke="#0d0a12" stroke-width="2" opacity="0.5">
      <line x1="360" y1="350" x2="418" y2="350"/><line x1="360" y1="320" x2="418" y2="320"/>
      <line x1="360" y1="290" x2="418" y2="290"/><line x1="360" y1="260" x2="418" y2="260"/>
      <line x1="360" y1="230" x2="418" y2="230"/><line x1="360" y1="200" x2="418" y2="200"/>
    </g>
    <text x="438" y="210" fill="#f85149" font-size="15" font-weight="700" filter="url(#gR)">💥 STACK
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.7;0.8;1" dur="2s" repeatCount="indefinite"/>
    </text>
    <text x="438" y="232" fill="#f85149" font-size="15" font-weight="700">OVERFLOW
      <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.7;0.8;1" dur="2s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- bitwise attempt (phases 2 & 3) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/>
    <text x="352" y="170" fill="#c9c2d1" font-size="13">bitwise() · <tspan fill="#3fb950">O(log n)</tspan></text>
    <!-- 16 bit cells + scanning highlight -->
    <g>
      <rect x="352" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="370" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="388" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="406" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="424" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="442" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="460" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="478" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="496" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="514" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="532" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="550" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="568" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="586" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="604" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect x="622" y="206" width="13" height="26" rx="2" fill="#21262d" stroke="#30363d"/>
      <rect y="206" width="22" height="26" rx="2" fill="#58a6ff" filter="url(#gB)" opacity="0.85">
        <animate attributeName="x" values="350;626" dur="0.9s" repeatCount="indefinite"/>
      </rect>
    </g>
    <text x="352" y="302" fill="#3fb950" font-size="22" font-weight="700">= 1234  ✓</text>
    <text x="352" y="328" fill="#d29922" font-size="12.5">fast af · AND falsy</text>
  </g>

  <!-- give-up (phase 4) -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;0;1" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/>
    <text x="490" y="252" font-size="46" text-anchor="middle">🔥</text>
    <text x="490" y="296" fill="#f0883e" font-size="17" font-weight="700" text-anchor="middle">gives up politely</text>
    <text x="490" y="320" fill="#8b7d92" font-size="12.5" text-anchor="middle">the cpu got nice and warm.</text>
  </g>

  <!-- ================= CPU THERMOMETER (right) ================= -->
  <text x="824" y="120" fill="#6e6478" font-size="11" text-anchor="middle" letter-spacing="1">CPU TEMP</text>
  <rect x="812" y="150" width="24" height="250" rx="12" fill="#161b22" stroke="#30363d"/>
  <circle cx="824" cy="410" r="26" fill="#161b22" stroke="#30363d"/>
  <!-- mercury column (rises across phases) -->
  <rect x="818" width="12">
    <animate attributeName="y"      values="370;315;260;205;165" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/>
    <animate attributeName="height" values="42;97;152;207;247"   keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/>
    <animate attributeName="fill"   values="#58a6ff;#79c0ff;#d29922;#f0883e;#f85149" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/>
  </rect>
  <circle cx="824" cy="410" r="18">
    <animate attributeName="fill" values="#58a6ff;#79c0ff;#d29922;#f0883e;#f85149" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/>
  </circle>
  <!-- heat halo at the top rung -->
  <circle cx="824" cy="410" r="30" fill="#f85149" opacity="0" filter="url(#soft)">
    <animate attributeName="opacity" values="0;0;0;0;0.5" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/>
  </circle>
  <!-- temperature readout (stacked) -->
  <g text-anchor="middle" font-size="14" font-weight="700">
    <text x="770" y="180" fill="#58a6ff">1°C<animate attributeName="opacity" values="1;0;0;0;0" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="770" y="180" fill="#79c0ff">14°C<animate attributeName="opacity" values="0;1;0;0;0" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="770" y="180" fill="#d29922">38°C<animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="770" y="180" fill="#f0883e">63°C<animate attributeName="opacity" values="0;0;0;1;0" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/></text>
    <text x="770" y="180" fill="#f85149">🔥<animate attributeName="opacity" values="0;0;0;0;1" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/></text>
  </g>
  <!-- winter gimmick (snowflake fades as it heats) -->
  <text x="876" y="300" font-size="22" text-anchor="middle">❄
    <animate attributeName="opacity" values="1;0.7;0.4;0.2;0.05" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/>
  </text>
  <text x="876" y="324" fill="#6e6478" font-size="10" text-anchor="middle">run in</text>
  <text x="876" y="337" fill="#6e6478" font-size="10" text-anchor="middle">winter only</text>

  <!-- phase ticks -->
  <g>
    <rect x="396" y="486" width="168" height="4" rx="2" fill="#241c2c"/>
    <rect x="396" y="486" width="30" height="4" rx="2" fill="#f85149">
      <animate attributeName="x" values="396;430;464;498;532" keyTimes="0;0.2;0.4;0.6;0.8" dur="10s" calcMode="discrete" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
