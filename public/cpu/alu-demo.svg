<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" role="img" aria-label="Animated 8-bit ALU datapath: registers A and B feed an ALU that cycles through ADD, SUB, AND, XOR, producing a result and setting Z/C/N/V flags.">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <linearGradient id="alu" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2733"/>
      <stop offset="100%" stop-color="#141a22"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== static layer ===== -->
  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- title -->
  <text x="40" y="50" fill="#c9d1d9" font-size="24" font-weight="700">ALU<tspan fill="#3fb950"> · </tspan><tspan fill="#8b949e" font-size="16" font-weight="400">8-bit datapath</tspan></text>
  <text x="42" y="72" fill="#586069" font-size="12">Cpu-Emulator — arithmetic &amp; logic unit</text>
  <!-- clock -->
  <text x="858" y="50" fill="#586069" font-size="12">CLK</text>
  <circle cx="906" cy="46" r="6" fill="#3fb950" filter="url(#glow)">
    <animate attributeName="opacity" values="1;0.15;1" dur="2s" repeatCount="indefinite" calcMode="discrete" keyTimes="0;0.5;1"/>
  </circle>

  <!-- register A -->
  <rect x="48" y="150" width="214" height="92" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="66" y="178" fill="#8b949e" font-size="13" letter-spacing="2">REG A</text>
  <!-- register B -->
  <rect x="48" y="320" width="214" height="92" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="66" y="348" fill="#8b949e" font-size="13" letter-spacing="2">REG B</text>

  <!-- buses A,B -> ALU (always flowing) -->
  <g stroke-linecap="round" fill="none">
    <path d="M262 196 H360 Q392 196 408 224 L432 236" stroke="#1f6feb" stroke-width="3" opacity="0.35"/>
    <path d="M262 196 H360 Q392 196 408 224 L432 236" stroke="#58a6ff" stroke-width="3" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" values="32;0" dur="0.7s" repeatCount="indefinite"/>
    </path>
    <path d="M262 366 H360 Q392 366 408 338 L432 326" stroke="#1f6feb" stroke-width="3" opacity="0.35"/>
    <path d="M262 366 H360 Q392 366 408 338 L432 326" stroke="#58a6ff" stroke-width="3" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" values="32;0" dur="0.7s" repeatCount="indefinite"/>
    </path>
    <!-- result bus ALU -> result -->
    <path d="M628 281 H704" stroke="#1f6feb" stroke-width="3" opacity="0.35"/>
    <path d="M628 281 H704" stroke="#3fb950" stroke-width="3" stroke-dasharray="6 10">
      <animate attributeName="stroke-dashoffset" values="32;0" dur="0.7s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- ALU body (classic notched trapezoid) -->
  <path d="M432 178 L600 218 L600 344 L432 384 L432 312 L466 281 L432 250 Z"
        fill="url(#alu)" stroke="#30363d" stroke-width="1.5"/>
  <text x="528" y="372" fill="#586069" font-size="11" text-anchor="middle" letter-spacing="2">ALU</text>

  <!-- operation menu -->
  <text x="444" y="110" fill="#484f58" font-size="14" text-anchor="middle">ADD</text>
  <text x="508" y="110" fill="#484f58" font-size="14" text-anchor="middle">SUB</text>
  <text x="572" y="110" fill="#484f58" font-size="14" text-anchor="middle">AND</text>
  <text x="636" y="110" fill="#484f58" font-size="14" text-anchor="middle">XOR</text>

  <!-- result register -->
  <rect x="704" y="236" width="208" height="92" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="722" y="264" fill="#8b949e" font-size="13" letter-spacing="2">RESULT</text>

  <!-- flag lamps (static dim) -->
  <g text-anchor="middle">
    <circle cx="730" cy="392" r="11" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <text x="730" y="424" fill="#586069" font-size="12">Z</text>
    <circle cx="790" cy="392" r="11" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <text x="790" y="424" fill="#586069" font-size="12">C</text>
    <circle cx="850" cy="392" r="11" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <text x="850" y="424" fill="#586069" font-size="12">N</text>
    <circle cx="910" cy="392" r="11" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <text x="910" y="424" fill="#586069" font-size="12">V</text>
  </g>
  <text x="722" y="470" fill="#484f58" font-size="11">flags · zero / carry / negative / overflow</text>

  <!-- ===== animated phase groups (discrete clock steps, 8s loop) ===== -->

  <!-- PHASE 0 : ADD 0xF0 + 0x20 = 0x10, Carry -->
  <g opacity="0">
    <animate attributeName="opacity" values="1;0;0;0" keyTimes="0;0.25;0.5;0.75" dur="8s" calcMode="discrete" repeatCount="indefinite"/>
    <text x="66" y="208" fill="#e6edf3" font-size="26" font-weight="700">0xF0</text>
    <text x="170" y="208" fill="#6e7681" font-size="13">1111 0000</text>
    <text x="66" y="378" fill="#e6edf3" font-size="26" font-weight="700">0x20</text>
    <text x="170" y="378" fill="#6e7681" font-size="13">0010 0000</text>
    <rect x="418" y="93" width="52" height="24" rx="6" fill="#3fb95022" stroke="#3fb950" stroke-width="1.2"/>
    <text x="444" y="110" fill="#3fb950" font-size="14" font-weight="700" text-anchor="middle">ADD</text>
    <text x="528" y="286" fill="#3fb950" font-size="22" font-weight="700" text-anchor="middle" filter="url(#glow)">+</text>
    <path d="M432 178 L600 218 L600 344 L432 384 L432 312 L466 281 L432 250 Z" fill="none" stroke="#3fb950" stroke-width="1.6" opacity="0.55" filter="url(#soft)"/>
    <text x="722" y="306" fill="#e6edf3" font-size="26" font-weight="700">0x10</text>
    <text x="826" y="306" fill="#6e7681" font-size="13">0001 0000</text>
    <circle cx="790" cy="392" r="11" fill="#d29922" filter="url(#glow)"/>
    <text x="790" y="424" fill="#f0c674" font-size="12" font-weight="700" text-anchor="middle">C</text>
  </g>

  <!-- PHASE 1 : SUB 0x2A - 0x2A = 0x00, Zero -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1;0;0" keyTimes="0;0.25;0.5;0.75" dur="8s" calcMode="discrete" repeatCount="indefinite"/>
    <text x="66" y="208" fill="#e6edf3" font-size="26" font-weight="700">0x2A</text>
    <text x="170" y="208" fill="#6e7681" font-size="13">0010 1010</text>
    <text x="66" y="378" fill="#e6edf3" font-size="26" font-weight="700">0x2A</text>
    <text x="170" y="378" fill="#6e7681" font-size="13">0010 1010</text>
    <rect x="482" y="93" width="52" height="24" rx="6" fill="#3fb95022" stroke="#3fb950" stroke-width="1.2"/>
    <text x="508" y="110" fill="#3fb950" font-size="14" font-weight="700" text-anchor="middle">SUB</text>
    <text x="528" y="287" fill="#3fb950" font-size="24" font-weight="700" text-anchor="middle" filter="url(#glow)">−</text>
    <path d="M432 178 L600 218 L600 344 L432 384 L432 312 L466 281 L432 250 Z" fill="none" stroke="#3fb950" stroke-width="1.6" opacity="0.55" filter="url(#soft)"/>
    <text x="722" y="306" fill="#e6edf3" font-size="26" font-weight="700">0x00</text>
    <text x="826" y="306" fill="#6e7681" font-size="13">0000 0000</text>
    <circle cx="730" cy="392" r="11" fill="#3fb950" filter="url(#glow)"/>
    <text x="730" y="424" fill="#7ee787" font-size="12" font-weight="700" text-anchor="middle">Z</text>
  </g>

  <!-- PHASE 2 : AND 0xCC & 0xAA = 0x88, Negative -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;1;0" keyTimes="0;0.25;0.5;0.75" dur="8s" calcMode="discrete" repeatCount="indefinite"/>
    <text x="66" y="208" fill="#e6edf3" font-size="26" font-weight="700">0xCC</text>
    <text x="170" y="208" fill="#6e7681" font-size="13">1100 1100</text>
    <text x="66" y="378" fill="#e6edf3" font-size="26" font-weight="700">0xAA</text>
    <text x="170" y="378" fill="#6e7681" font-size="13">1010 1010</text>
    <rect x="546" y="93" width="52" height="24" rx="6" fill="#bc8cff22" stroke="#bc8cff" stroke-width="1.2"/>
    <text x="572" y="110" fill="#bc8cff" font-size="14" font-weight="700" text-anchor="middle">AND</text>
    <text x="528" y="286" fill="#bc8cff" font-size="20" font-weight="700" text-anchor="middle" filter="url(#glow)">&amp;</text>
    <path d="M432 178 L600 218 L600 344 L432 384 L432 312 L466 281 L432 250 Z" fill="none" stroke="#bc8cff" stroke-width="1.6" opacity="0.55" filter="url(#soft)"/>
    <text x="722" y="306" fill="#e6edf3" font-size="26" font-weight="700">0x88</text>
    <text x="826" y="306" fill="#6e7681" font-size="13">1000 1000</text>
    <circle cx="850" cy="392" r="11" fill="#58a6ff" filter="url(#glow)"/>
    <text x="850" y="424" fill="#a5d6ff" font-size="12" font-weight="700" text-anchor="middle">N</text>
  </g>

  <!-- PHASE 3 : XOR 0x4B ^ 0xB4 = 0xFF, Negative -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;0;0;1" keyTimes="0;0.25;0.5;0.75" dur="8s" calcMode="discrete" repeatCount="indefinite"/>
    <text x="66" y="208" fill="#e6edf3" font-size="26" font-weight="700">0x4B</text>
    <text x="170" y="208" fill="#6e7681" font-size="13">0100 1011</text>
    <text x="66" y="378" fill="#e6edf3" font-size="26" font-weight="700">0xB4</text>
    <text x="170" y="378" fill="#6e7681" font-size="13">1011 0100</text>
    <rect x="610" y="93" width="52" height="24" rx="6" fill="#bc8cff22" stroke="#bc8cff" stroke-width="1.2"/>
    <text x="636" y="110" fill="#bc8cff" font-size="14" font-weight="700" text-anchor="middle">XOR</text>
    <text x="528" y="287" fill="#bc8cff" font-size="22" font-weight="700" text-anchor="middle" filter="url(#glow)">⊕</text>
    <path d="M432 178 L600 218 L600 344 L432 384 L432 312 L466 281 L432 250 Z" fill="none" stroke="#bc8cff" stroke-width="1.6" opacity="0.55" filter="url(#soft)"/>
    <text x="722" y="306" fill="#e6edf3" font-size="26" font-weight="700">0xFF</text>
    <text x="826" y="306" fill="#6e7681" font-size="13">1111 1111</text>
    <circle cx="850" cy="392" r="11" fill="#58a6ff" filter="url(#glow)"/>
    <text x="850" y="424" fill="#a5d6ff" font-size="12" font-weight="700" text-anchor="middle">N</text>
  </g>

  <!-- phase progress ticks -->
  <g>
    <rect x="432" y="404" width="168" height="4" rx="2" fill="#21262d"/>
    <rect x="432" y="404" width="42" height="4" rx="2" fill="#3fb950">
      <animate attributeName="x" values="432;474;516;558" keyTimes="0;0.25;0.5;0.75" dur="8s" calcMode="discrete" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
